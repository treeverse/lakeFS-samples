name: lakefs-dvc-to-lakefs-migration

services:
  jupyter-notebook:
    build: .
    pull_policy: build
    environment:
      - NOTEBOOK_ARGS=--log-level='WARN' --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/home/jovyan
      # lakeFS connection (read by the lakeFS Python SDK and by dvc-to-lakefs).
      - LAKECTL_SERVER_ENDPOINT_URL=http://lakefs:8000
      - LAKECTL_CREDENTIALS_ACCESS_KEY_ID=AKIAIOSFOLKFSSAMPLES
      - LAKECTL_CREDENTIALS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      # MinIO / S3 connection used by DVC's S3 remote.
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MINIO_ENDPOINT_URL=http://minio:9000
    ports:
      - "8888:8888" # Jupyter
    volumes:
      - $PWD:/home/jovyan/work
    depends_on:
      - lakefs

  lakefs:
    image: treeverse/lakefs:1
    pull_policy: always
    depends_on:
      - minio-setup
    ports:
      - "8000:8000"
    environment:
      - LAKEFS_DATABASE_TYPE=local
      - LAKEFS_BLOCKSTORE_TYPE=s3
      - LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE=true
      - LAKEFS_BLOCKSTORE_S3_ENDPOINT=http://minio:9000
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID=minioadmin
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY=minioadmin
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=some random secret string
      - LAKEFS_LOGGING_LEVEL=WARN
      - LAKEFS_STATS_ENABLED=${LAKEFS_STATS_ENABLED:-1}
      - LAKEFS_INSTALLATION_USER_NAME=dvc-migration-demo
      - LAKEFS_INSTALLATION_ACCESS_KEY_ID=AKIAIOSFOLKFSSAMPLES
      - LAKEFS_INSTALLATION_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        lakefs run --local-settings &
        echo "------------------------------------------------"
        wait-for -t 60 minio:9000 && echo "MinIO is ready"
        wait-for -t 60 lakefs:8000 && echo "lakeFS is ready"
        echo ""
        echo "  lakeFS Web UI:   http://127.0.0.1:8000/"
        echo "  MinIO Console:   http://127.0.0.1:9001/  (minioadmin / minioadmin)"
        echo ""
        echo "  Open the notebook at: http://127.0.0.1:8888/lab/tree/work"
        echo "------------------------------------------------"
        wait

  # Create the two MinIO buckets the demo needs:
  #   dvc-remote     - the DVC remote (where 'dvc push' uploads object data)
  #   lakefs-storage - the lakeFS repository's storage namespace
  # Both live on the same MinIO instance, which is what makes the zero-copy,
  # import-by-reference migration valid.
  minio-setup:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    environment:
      - MC_HOST_minio=http://minioadmin:minioadmin@minio:9000
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        wait-for -t 60 minio:9000 || mc ready minio
        mc mb -p minio/dvc-remote minio/lakefs-storage

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    entrypoint: ["minio", "server", "/data", "--console-address", ":9001"]

networks:
  default:
    name: lakefs-dvc-to-lakefs-migration-network
